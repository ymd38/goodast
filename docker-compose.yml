services:
  db:
    image: postgres:16-alpine
    environment:
      # ローカル開発用のデフォルト。本番は環境変数で必ず上書きする。
      POSTGRES_DB: ${POSTGRES_DB:-goodast}
      POSTGRES_USER: ${POSTGRES_USER:-goodast}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-goodast}
    ports:
      # 外部公開を避けるため loopback に限定する（ローカル開発のみ）。
      - "127.0.0.1:5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  api:
    build: ./api
    depends_on: [db]
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-goodast}:${POSTGRES_PASSWORD:-goodast}@db:5432/${POSTGRES_DB:-goodast}
    ports:
      - "127.0.0.1:8080:8080"

  worker:
    build: ./worker
    depends_on: [db]
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-goodast}:${POSTGRES_PASSWORD:-goodast}@db:5432/${POSTGRES_DB:-goodast}

  web:
    build: ./web
    depends_on: [api]
    ports:
      - "127.0.0.1:3000:3000"

  # 検証用: make juiceshop-up で起動。意図的に脆弱なため loopback に限定し外部へ露出させない。
  juiceshop:
    image: bkimminich/juice-shop
    ports:
      - "127.0.0.1:3001:3000"
    profiles: [juiceshop]

volumes:
  db_data:
