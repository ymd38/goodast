version: "2"
sql:
  - engine: "postgresql"
    # アプリスキーマの up マイグレーションのみ参照する。river のテーブルは river が管理する
    # ため除外（新しいアプリ migration を追加したらこのリストに追記する）。
    schema:
      - "../migrations/000001_initial_schema.up.sql"
      - "../migrations/000004_sites_verify_consistency.up.sql"
      - "../migrations/000005_scan_credentials_unique_site.up.sql"
      - "../migrations/000006_scans_preset.up.sql"
      - "../migrations/000007_scans_one_active_per_site.up.sql"
    queries: "internal/db/queries"
    gen:
      go:
        package: "db"
        out: "internal/db"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_interface: true
